<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>127섹션 가챠 시뮬레이터 - Final Ver.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ssr-color: #FFD700;
            --sr-color: #A335EE;
            --r-color: #0070DD;
            --bg-dark: #121214; 
            --flash-color: white;
            --hazard-color: #ffcc00;
        }

        /* 로딩 화면 스타일 */
        #loading-screen {
            position: fixed; inset: 0; background-color: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .biohazard-loader { position: relative; width: 150px; height: 150px; animation: bio-rotate 3s linear infinite; }
        .bio-circle { position: absolute; width: 70px; height: 70px; border: 12px solid var(--hazard-color); border-radius: 50%; }
        .bc1 { top: 0; left: 50%; transform: translateX(-50%); }
        .bc2 { bottom: 10px; left: 0; }
        .bc3 { bottom: 10px; right: 0; }
        .bio-center-mask { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 55px; height: 55px; background-color: #000; border-radius: 50%; z-index: 2; border: 8px solid var(--hazard-color); }
        .loading-text { margin-top: 60px; color: var(--hazard-color); font-family: 'Courier New', Courier, monospace; font-weight: bold; letter-spacing: 3px; text-align: center; animation: pulse-text 1.5s infinite; }
        @keyframes bio-rotate { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }
        @keyframes pulse-text { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .loaded #loading-screen { opacity: 0; visibility: hidden; }

        /* 기본 스타일 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: white; user-select: none; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-size: cover; background-position: center; transition: opacity 0.8s ease-in-out; z-index: 0; }
        .main-wrapper { position: relative; display: flex; width: 100vw; height: 100vh; z-index: 1; background: transparent; }
        
        /* 사이드바 */
        .sidebar { width: 130px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); display: flex; flex-direction: column; gap: 15px; padding: 20px 10px; border-right: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; justify-content: center; }
        .banner-tab { width: 100px; height: 45px; background: rgba(50, 50, 50, 0.6); border: 1px solid #444; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0; color: #aaa; transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1); text-align: center; }
        .banner-tab:hover { background: rgba(80, 80, 80, 0.8); }
        .banner-tab.active { width: 115px; height: 65px; border-color: var(--ssr-color); color: white; background: rgba(20, 20, 20, 0.95); font-weight: bold; font-size: 0.95rem; transform: translateX(5px); box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        
        /* 콘텐츠 영역 */
        .content-body { flex: 1; position: relative; display: flex; align-items: center; padding: 0 50px; }
        .content-body::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(0,0,0,0.6) 0%, transparent 100%); z-index: -1; pointer-events: none; }
        
        /* 배너 정보 박스 */
        .banner-info { position: relative; width: 450px; background: rgba(255, 255, 255, 0.9); color: #333; padding: 40px 30px; border-radius: 0 40px 0 0; clip-path: polygon(0 0, 100% 0, 92% 100%, 0% 100%); backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: -50px; }
        
        /* 우측 상단 누적 카운터 */
        .total-pull-counter {
            position: absolute; top: 20px; right: 30px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #555;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        /* 하단 바 (버튼 영역) */
        .bottom-bar { position: absolute; bottom: 40px; right: 60px; display: flex; gap: 20px; z-index: 5; align-items: center; }
        
        /* 확률 정보 버튼 스타일 */
        .rate-info-btn {
            background: transparent; color: #aaa; border: 1px solid #666; 
            padding: 10px 15px; border-radius: 4px; cursor: pointer; 
            font-size: 0.9rem; margin-right: 10px; transition: 0.3s;
        }
        .rate-info-btn:hover { color: white; border-color: white; background: rgba(255,255,255,0.1); }

        .warp-btn { background: white; color: black; border: none; padding: 15px 45px; border-radius: 4px; font-weight: 800; cursor: pointer; font-size: 1.2rem; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); transition: transform 0.1s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .warp-btn:active { transform: scale(0.95); }

        /* 가챠 이펙트 */
        #gacha-overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: none; overflow: hidden; }
        #bg-glow { position: absolute; inset: 0; background: radial-gradient(circle at center, var(--flash-color) 0%, transparent 70%); opacity: 0; transition: opacity 1s; mix-blend-mode: screen; z-index: 101; }
        #fog-layer { position: absolute; inset: 0; opacity: 0; transition: opacity 1.5s; background: radial-gradient(circle at 50% 100%, rgba(255,255,255,0.8) 0%, transparent 100%); mix-blend-mode: screen; z-index: 105; }
        .meteor { position: absolute; width: 300px; height: 4px; transform: rotate(-45deg); opacity: 0; z-index: 110; pointer-events: none; }
        @keyframes shoot-diagonal-irregular { 0% { transform: translate(0, 0) rotate(-45deg) scale(0.5); opacity: 0; } 10% { opacity: 1; } 100% { transform: translate(-150vw, 150vh) rotate(-45deg) scale(2); opacity: 0; } }
        #final-impact { position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: #222; z-index: 120; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; }
        .fissure { position: absolute; background: var(--flash-color); opacity: 0; box-shadow: 0 0 20px var(--flash-color); }
        .fissure.h { width: 110%; height: 3px; transform: rotate(15deg); }
        .fissure.v { width: 3px; height: 110%; transform: rotate(-25deg); }
        .fissure.d { width: 110%; height: 2px; transform: rotate(70deg); }
        .anim-stage-1 #fog-layer, .anim-stage-1 #bg-glow { opacity: 0.4; }
        .anim-stage-2 #final-impact { animation: impact-scale 0.6s forwards; }
        .anim-stage-3 .fissure.h { animation: crack-appear 0.2s 0.1s forwards; }
        .anim-stage-3 .fissure.v { animation: crack-appear 0.2s 0.3s forwards; }
        .anim-stage-3 .fissure.d { animation: crack-appear 0.2s 0.5s forwards; }
        @keyframes impact-scale { 0% { width: 0; height: 0; } 100% { width: 280px; height: 280px; } }
        @keyframes crack-appear { from { opacity: 0; transform: scale(0.5) rotate(inherit); } to { opacity: 1; transform: scale(1) rotate(inherit); } }
        
        /* 결과 화면 */
        .pictogram-box { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 5rem; color: #ddd; transition: all 0.3s; }
        .SSR .pictogram-box { color: var(--ssr-color); filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5)); }
        .SR .pictogram-box { color: var(--sr-color); filter: drop-shadow(0 0 8px rgba(163, 53, 238, 0.5)); }
        .R .pictogram-box { color: #888; }
        #single-reveal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 150; display: none; align-items: center; justify-content: center; cursor: pointer; transition: background 0.5s; }
        .reveal-glow { position: absolute; inset: 0; background: radial-gradient(circle at center, var(--current-item-color) 0%, transparent 60%); opacity: 0.3; pointer-events: none; }
        .reveal-item-wrapper { text-align: center; animation: item-appear 0.5s ease-out; z-index: 151; display:flex; flex-direction: column; align-items: center; }
        .reveal-icon-large { font-size: 10rem; margin-bottom: 30px; color: var(--current-item-color); filter: drop-shadow(0 0 40px var(--current-item-color)); }
        .reveal-item-name { font-size: 2.5rem; font-weight: bold; margin: 0; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        @keyframes item-appear { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* 결과 그리드 */
        #result-grid-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .grid-container { display: grid; grid-template-columns: repeat(5, 150px); gap: 20px; }
        .card { width: 150px; height: 180px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; background: #222; border: 1px solid #444; position: relative; overflow: hidden; justify-content: center; }
        .card-content { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .card-icon { font-size: 3.5rem; }
        .card-name { font-size: 0.8rem; padding: 10px 5px; text-align: center; color: #eee; background: rgba(0,0,0,0.5); width: 100%; box-sizing: border-box; }
        .card.SSR { border: 2px solid var(--ssr-color); box-shadow: 0 0 15px rgba(255,215,0,0.2); }
        .card.SR { border: 2px solid var(--sr-color); }
        .card.SSR .card-icon { color: var(--ssr-color); }
        .card.SR .card-icon { color: var(--sr-color); }
        .card.R .card-icon { color: #888; }

        /* 인벤토리 오버레이 및 패널 */
        #inventory-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 290; display: none; opacity: 0; transition: opacity 0.5s; }
        #inventory-overlay.active { opacity: 1; }
        
        #inventory-panel { position: fixed; left: 0; bottom: -100%; width: 100%; height: 80%; background: #111; z-index: 300; transition: 0.5s; padding: 30px; border-top: 3px solid #444; box-sizing: border-box; overflow-y: auto; }
        #inventory-panel.open { bottom: 0; }
        .inv-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: #666; color: white; border: none; padding: 10px 25px; cursor: pointer; border-radius: 8px; font-weight: bold; transition: background 0.2s; }
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .inv-card { width: 100%; aspect-ratio: 3/4; background: #222; border-radius: 5px; border: 1px solid #333; position: relative; display: flex; flex-direction: column; font-size: 0.7rem; overflow: hidden; cursor: pointer; align-items: center; }
        .inv-card .inv-icon { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .inv-card .count-tag { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); color: #fff; padding: 2px 6px; border-radius: 10px; font-weight: bold; z-index: 2; }
        .inv-card.SSR { border-color: var(--ssr-color); } .inv-card.SSR .inv-icon { color: var(--ssr-color); }
        .inv-card.SR { border-color: var(--sr-color); } .inv-card.SR .inv-icon { color: var(--sr-color); }

        .filter-btn { background: #333; border: 1px solid #555; color: #888; padding: 5px 15px; border-radius: 20px; cursor: pointer; margin-right: 5px; font-size: 0.9rem; transition: all 0.2s; }
        .filter-btn.active { color: white; border-color: white; font-weight: bold; }
        .filter-btn.active[data-grade="SSR"] { background: var(--ssr-color); border-color: var(--ssr-color); color: black; }
        .filter-btn.active[data-grade="SR"] { background: var(--sr-color); border-color: var(--sr-color); }
        .filter-btn.active[data-grade="R"] { background: var(--r-color); border-color: var(--r-color); }

        /* 확률 정보 팝업 */
        #rate-popup { position: fixed; inset: 0; z-index: 500; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); }
        .rate-content { width: 400px; background: #222; border: 1px solid #444; padding: 30px; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.8); position: relative; }
        .rate-table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #ddd; font-size: 0.9rem; }
        .rate-table th, .rate-table td { border-bottom: 1px solid #444; padding: 10px; text-align: left; }
        .rate-table th { color: #888; }
        
        #item-detail-view { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 400; display: none; align-items: center; justify-content: center; cursor: pointer; flex-direction: column; }
        .pity-counter { margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.05); border-radius: 5px; font-size: 0.85rem; border-left: 4px solid #666; color: #555; font-weight: bold; }
        select { background:#333; color:white; border:1px solid #555; padding:5px; border-radius:5px; outline:none; font-size: 0.9rem; }
    </style>
</head>

        SSR: ["보랏빛 드론 소년 코스튬", "녹색빛 연구원 소년 코스튬", "붉은빛 경보 생존자 코스튬", "푸른빛 정찰병 소년 코스튬", "검은빛 기술자 소년 코스튬", "노란빛 방사능 차단 코스튬", "주황빛 감시자 소년 코스튬"],
        SR: ["헤진 방호복", "폐허 탐색자 재킷", "임시 연구원 가운", "오염 지대 작업복", "붕대 감은 생존자 복장", "정찰병 후드 코트", "폐기된 군용 유니폼", "방진 마스크 생존복", "도시 러너 복장", "임시 강화 보호복"],
        R: ["낡은 청바지 코스튬", "해진 티셔츠", "평범한 작업복", "오래된 학생복", "생존자 기본 셔츠", "낡은 운동복", "보급용 방한복", "낡은 재킷", "기초 보호 복장"]
    };

    const bannerImages = [
        "https://images.unsplash.com/photo-1518546305927-5a555bb7020d?auto=format&fit=crop&w=1600&q=80",
        "https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&w=1600&q=80",
        "https://images.unsplash.com/photo-1615840287214-7ff58936c4cf?auto=format&fit=crop&w=1600&q=80",
        "https://images.unsplash.com/photo-1475113548554-5a36f1f523d6?auto=format&fit=crop&w=1600&q=80",
        "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=1600&q=80",
        "https://images.unsplash.com/photo-1569691105751-88b00b5729a8?auto=format&fit=crop&w=1600&q=80"
    ];

    const banners = [
        { id: 1, name: "드론 소년", pickup: "보랏빛 드론 소년 코스튬" },
        { id: 2, name: "연구원 소년", pickup: "녹색빛 연구원 소년 코스튬" },
        { id: 3, name: "경보 생존자", pickup: "붉은빛 경보 생존자 코스튬" },
        { id: 4, name: "정찰병 소년", pickup: "푸른빛 정찰병 소년 코스튬" },
        { id: 5, name: "기술자 소년", pickup: "검은빛 기술자 소년 코스튬" },
        { id: 6, name: "방사능 차단", pickup: "노란빛 방사능 차단 코스튬" }
    ];

    let currentIdx = 0, gachaState = "idle", currentResults = [], revealIndex = 0, timeouts = [], inventory = {}, invOpen = false;
    let cntSR = 0, cntSSR = 0, cntPickup = 0, totalPullCount = 0; // 누적 카운트 변수 추가
    let activeFilters = new Set(['SSR', 'SR', 'R']);
    let activeBgLayer = 1;

    function init() {
        const sidebar = document.getElementById('sidebar');
        banners.forEach((b, i) => {
            const t = document.createElement('div');
            t.className = `banner-tab ${i===0?'active':''}`;
            t.innerText = b.name;
            t.onclick = (e) => { e.stopPropagation(); switchBanner(i); };
            sidebar.appendChild(t);
        });
        document.getElementById('bg-layer-1').style.backgroundImage = `url('${bannerImages[0]}')`;
        switchBanner(0);
        updatePityDisplay();
    }

    function switchBanner(i) {
        currentIdx = i;
        const b = banners[i];
        document.getElementById('banner-title').innerText = b.name + " 픽업";
        document.getElementById('pickup-target').innerText = `Pick Up: ${b.pickup}`;
        document.querySelectorAll('.banner-tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
        const bgUrl = bannerImages[i % bannerImages.length];
        const layer1 = document.getElementById('bg-layer-1'), layer2 = document.getElementById('bg-layer-2');
        if (activeBgLayer === 1) { layer2.style.backgroundImage = `url('${bgUrl}')`; layer2.style.opacity = '1'; layer1.style.opacity = '0'; activeBgLayer = 2; }
        else { layer1.style.backgroundImage = `url('${bgUrl}')`; layer1.style.opacity = '1'; layer2.style.opacity = '0'; activeBgLayer = 1; }
    }

    function updatePityDisplay() {
        document.getElementById('pity-ssr-text').innerText = `SSR 확정까지: ${80 - cntSSR}회`;
        document.getElementById('pity-pickup-text').innerText = `픽업 확정까지: ${150 - cntPickup}회`;
        document.getElementById('pity-sr-text').innerText = `SR 확정까지: ${10 - cntSR}회`;
    }

    function runGacha(count) {
        if(gachaState !== "idle") return;
        gachaState = "intro";
        currentResults = []; revealIndex = 0; timeouts = [];
        const currentBanner = banners[currentIdx];
        let maxRarity = 'R'; 
        
        // 누적 횟수 증가 및 UI 업데이트
        totalPullCount += count;
        document.getElementById('total-pull-count').innerText = totalPullCount;

        for(let i=0; i<count; i++) {
            let rarity = 'R', itemName = '', isPickup = false;
            let r = Math.random() * 100;
            if (cntPickup >= 149) { rarity = 'SSR'; itemName = currentBanner.pickup; isPickup = true; }
            else if (cntSSR >= 79) {
                rarity = 'SSR';
                if (Math.random() < 0.5) { itemName = currentBanner.pickup; isPickup = true; }
                else { itemName = itemPool.SSR.filter(n => n !== currentBanner.pickup)[Math.floor(Math.random()*6)]; }
            }
            else if (cntSR >= 9 && r >= 1) { rarity = 'SR'; itemName = itemPool.SR[Math.floor(Math.random()*itemPool.SR.length)]; }
            else {
                if (r < 1) {
                    rarity = 'SSR';
                    if (Math.random() < 0.5) { itemName = currentBanner.pickup; isPickup = true; }
                    else { itemName = itemPool.SSR[Math.floor(Math.random()*itemPool.SSR.length)]; }
                } else if (r < 14) { rarity = 'SR'; itemName = itemPool.SR[Math.floor(Math.random()*itemPool.SR.length)]; }
                else { rarity = 'R'; itemName = itemPool.R[Math.floor(Math.random()*itemPool.R.length)]; }
            }
            if (rarity === 'SSR') { cntSSR = 0; cntSR = 0; if (isPickup) cntPickup = 0; else cntPickup++; maxRarity = 'SSR'; }
            else if (rarity === 'SR') { cntSR = 0; cntSSR++; cntPickup++; if(maxRarity !== 'SSR') maxRarity = 'SR'; }
            else { cntSR++; cntSSR++; cntPickup++; }
            currentResults.push({ rarity, name: itemName });
            updateInventory(itemName, rarity);
        }
        updatePityDisplay();
        triggerAnimation(maxRarity);
    }

    function updateInventory(name, rarity) {
        if (inventory[name]) { inventory[name].count++; inventory[name].timestamp = Date.now(); }
        else { inventory[name] = { rarity, count: 1, timestamp: Date.now() }; }
    }

    function triggerAnimation(maxRarity) {
        const overlay = document.getElementById('gacha-overlay');
        const flashColor = maxRarity === 'SSR' ? 'var(--ssr-color)' : (maxRarity === 'SR' ? 'var(--sr-color)' : 'var(--r-color)');
        document.documentElement.style.setProperty('--flash-color', flashColor);
        overlay.style.display = 'block'; overlay.className = '';
        const meteorLayer = document.getElementById('meteor-layer'); meteorLayer.innerHTML = '';
        for(let i=0; i<12; i++) {
            const m = document.createElement('div'); m.className = 'meteor';
            m.style.background = `linear-gradient(90deg, white, ${flashColor}, transparent)`;
            m.style.top = (Math.random() * -30) + "vh"; m.style.right = (Math.random() * -20) + "vw";
            m.style.animation = `shoot-diagonal-irregular ${0.6 + Math.random()*0.5}s ease-in ${Math.random()*0.6}s forwards`;
            meteorLayer.appendChild(m);
        }
        timeouts.push(setTimeout(() => overlay.classList.add('anim-stage-1'), 50));
        timeouts.push(setTimeout(() => overlay.classList.add('anim-stage-2'), 1000));
        timeouts.push(setTimeout(() => overlay.classList.add('anim-stage-3'), 1600));
        timeouts.push(setTimeout(() => startRevealSequence(), 2500));
    }

    function startRevealSequence() {
        gachaState = "revealing";
        document.getElementById('gacha-overlay').style.display = 'none';
        document.getElementById('single-reveal').style.display = 'flex';
        renderItemReveal();
    }

    function renderItemReveal() {
        const item = currentResults[revealIndex];
        const content = document.getElementById('reveal-content');
        const colorVar = `var(--${item.rarity.toLowerCase()}-color)`;
        content.innerHTML = `
            <div class="reveal-item-wrapper">
                <i class="fa-solid ${iconMap[item.name] || 'fa-question'} reveal-icon-large"></i>
                <h1 class="reveal-item-name" style="color:${colorVar}">${item.name}</h1>
                <h3 style="margin:10px 0 0 0; color:#888;">${item.rarity}</h3>
            </div>`;
    }

    function handleGlobalClick(e) {
        if (invOpen || !document.body.classList.contains('loaded')) return;
        if (gachaState === "intro") { timeouts.forEach(clearTimeout); showFinalGrid(); }
        else if (gachaState === "revealing") {
            revealIndex++;
            if (revealIndex < currentResults.length) renderItemReveal();
            else showFinalGrid();
        }
    }

    function showFinalGrid() {
        gachaState = "finished";
        document.getElementById('single-reveal').style.display = 'none';
        const grid = document.getElementById('grid-container'); grid.innerHTML = '';
        document.getElementById('result-grid-screen').style.display = 'flex';
        currentResults.forEach(item => {
            const card = document.createElement('div'); card.className = `card ${item.rarity}`;
            card.innerHTML = `<div class="card-content"><i class="fa-solid ${iconMap[item.name] || 'fa-question'} card-icon"></i></div><div class="card-name">${item.name}</div>`;
            grid.appendChild(card);
        });
    }

    function closeAllResults() { document.getElementById('result-grid-screen').style.display = 'none'; gachaState = "idle"; }
    
    // 인벤토리 열기/닫기 (오버레이 포함)
    function toggleInv(show) { 
        invOpen = show; 
        if (show) renderInventory(); 
        document.getElementById('inventory-panel').classList.toggle('open', show);
        const overlay = document.getElementById('inventory-overlay');
        if(show) {
            overlay.style.display = 'block';
            setTimeout(() => overlay.classList.add('active'), 10);
        } else {
            overlay.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 500);
        }
    }
    
    // 확률 정보 팝업 토글
    function toggleRatePopup(show) {
        document.getElementById('rate-popup').style.display = show ? 'flex' : 'none';
    }

    function toggleFilter(grade) { if (activeFilters.has(grade)) activeFilters.delete(grade); else activeFilters.add(grade); document.querySelector(`.filter-btn[data-grade="${grade}"]`).classList.toggle('active', activeFilters.has(grade)); renderInventory(); }

    function renderInventory() {
        const container = document.getElementById('inv-grid');
        const sortType = document.getElementById('sort-order').value;
        container.innerHTML = '';
        let keys = Object.keys(inventory).filter(k => activeFilters.has(inventory[k].rarity));
        if (sortType === 'latest') keys.sort((a, b) => inventory[b].timestamp - inventory[a].timestamp);
        else if (sortType === 'count') keys.sort((a, b) => inventory[b].count - inventory[a].count);
        keys.forEach(name => {
            const data = inventory[name];
            const card = document.createElement('div'); card.className = `inv-card ${data.rarity}`;
            card.onclick = (e) => { e.stopPropagation(); showItemDetail(name, data.rarity); };
            card.innerHTML = `<div class="count-tag">x${data.count}</div><div class="inv-icon"><i class="fa-solid ${iconMap[name] || 'fa-question'}"></i></div><div style="padding:5px; text-align:center; background:rgba(0,0,0,0.6); width:100%; box-sizing:border-box;">${name}</div>`;
            container.appendChild(card);
        });
    }

    function showItemDetail(name, rarity) {
        const detailView = document.getElementById('item-detail-view');
        const content = document.getElementById('detail-content');
        const colorVar = `var(--${rarity.toLowerCase()}-color)`;
        content.innerHTML = `<i class="fa-solid ${iconMap[name] || 'fa-question'} reveal-icon-large"></i><h1 style="margin:0; color:white; font-size:2rem;">${name}</h1><h3 style="color:${colorVar}">${rarity}</h3><p style="color:#888; margin-top:20px;">탭하여 보관함으로 돌아가기</p>`;
        detailView.style.display = 'flex';
    }

    function hideItemDetail(e) { e.stopPropagation(); document.getElementById('item-detail-view').style.display = 'none'; }

    init();
</script>
</body>
</html>
